<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>정총무 — 프랜차이즈 원스톱 솔루션</title>

<style>
body { font-family: sans-serif; margin:0; }

.ref-section {
  padding: 60px 20px;
}

.section-title {
  font-size: 28px;
  font-weight: bold;
}

.brands-grid {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(4,1fr);
  border:1px solid #ddd;
}

.brand-cell {
  border:1px solid #eee;
  padding:12px;
  text-align:center;
}

.brand-name {
  font-size:14px;
  font-weight:600;
}
</style>
</head>

<body>

<section class="ref-section">
  <h2 class="section-title">함께한 브랜드들</h2>
  <div class="brands-grid" id="brandGrid"></div>
</section>

<script>
document.addEventListener("DOMContentLoaded", function() {

  const brands = [
    "그레이피플","바나타이거","셀렉토","밥풀릭스","맛찜","옐레드","짱탁구장","우규",
    "아담만두","명성가","맛찜랭킹","소낙스","팔각도","호텔런드리","명백집","뭉텅",
    "닭장맥주","손정보쌈","프레드피자","미아리우동집","깻떡","금싸빠","압구정화로구이",
    "로칼","와요커피","메카폰","싸다김밥","온미정","한사리감자탕","마니달오",
    "에이플러스짐","육오랑","원카츠","다이닝숲","조마루감자탕","연남동미용실",
    "조교동감자탕","홍이집","팔도밥상","얌샘김밥"
  ];

  const grid = document.getElementById('brandGrid');

  if (!grid) {
    console.error("brandGrid 없음");
    return;
  }

  brands.forEach(name => {
    const cell = document.createElement('div');
    cell.className = 'brand-cell';
    cell.innerHTML = `<span class="brand-name">${name}</span>`;
    grid.appendChild(cell);
  });

});
</script>

</body>
</html>
